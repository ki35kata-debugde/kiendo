<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奇縁堂 — 不思議な店主の物語</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#1b140f;
    --bg-deep2:#241a13;
    --panel:#ece0c2;
    --panel2:#e2d3ac;
    --ink:#2b2118;
    --ink-soft:#5a4a38;
    --seal:#a3312a;
    --seal-dark:#7c2420;
    --gold:#b8912f;
    --gold-soft:#d9c283;
    --line:#c9b98f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 20% -10%, #33251a 0%, transparent 55%),
      radial-gradient(ellipse at 90% 110%, #2a1d14 0%, transparent 50%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-deep2) 100%);
    color: var(--ink);
    font-family:'Noto Serif JP', serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 28px 14px;
  }
  #app{ width:100%; max-width: 640px; }

  .scroll{
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel2) 100%);
    border: 1px solid var(--line);
    border-radius: 4px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.55), 0 2px 0 rgba(255,255,255,0.15) inset;
    position: relative;
    overflow: hidden;
  }
  .scroll::before, .scroll::after{
    content:"";
    display:block;
    height: 14px;
    background:
      repeating-linear-gradient(90deg, var(--gold) 0 2px, transparent 2px 14px);
    opacity:0.55;
  }
  .scroll-inner{ padding: 30px 26px 26px; }

  .shop-header{
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px; margin-bottom: 18px;
    gap: 10px; flex-wrap: wrap;
  }
  .shop-name{
    font-family:'Shippori Mincho', serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: 0.08em;
    color: var(--ink);
  }
  .shop-name small{
    display:block; font-family:'Noto Serif JP',serif; font-weight:500;
    font-size: 11px; letter-spacing:0.15em; color: var(--ink-soft); margin-top:2px;
  }
  .seals{ display:flex; gap:6px; }
  .seal-dot{
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--seal-dark);
    display:flex; align-items:center; justify-content:center;
    font-size: 10px; color: var(--seal-dark);
    font-family:'Shippori Mincho',serif;
    transition: all 0.35s ease;
  }
  .seal-dot.filled{ background: var(--seal); color:#f4e9d0; border-color: var(--seal-dark); box-shadow:0 0 0 1px rgba(255,255,255,0.15) inset;}

  .stage-label{
    font-size: 11px; letter-spacing:0.2em; color: var(--gold); font-weight:700;
    margin-bottom: 6px; text-transform:uppercase;
  }

  /* Title screen */
  .title-block{ text-align:center; padding: 10px 6px 4px; }
  .title-mark{ font-size: 42px; color: var(--seal); margin-bottom: 4px; }
  .title-block h1{
    font-family:'Shippori Mincho', serif; font-size: 30px; margin: 6px 0 2px; letter-spacing:0.1em;
  }
  .title-block .sub{ color: var(--ink-soft); font-size: 13px; margin-bottom: 20px; letter-spacing:0.05em; }
  .lore{
    text-align:left; background: rgba(255,255,255,0.28); border:1px solid var(--line);
    border-radius:3px; padding: 16px 18px; font-size: 14.5px; line-height:1.9; color: var(--ink);
    margin-bottom: 22px;
  }
  .lore p{ margin: 0 0 10px; }
  .lore p:last-child{ margin-bottom:0; }

  button.primary{
    display:block; width:100%;
    background: var(--seal); color:#f6ead2; border:none;
    font-family:'Shippori Mincho', serif; font-weight:700; font-size:17px;
    letter-spacing:0.15em; padding: 14px 10px; border-radius: 3px; cursor:pointer;
    box-shadow: 0 4px 0 var(--seal-dark);
    transition: transform 0.12s ease;
  }
  button.primary:active{ transform: translateY(3px); box-shadow:0 1px 0 var(--seal-dark); }
  button.primary:hover{ filter: brightness(1.06); }

  /* Guest / request */
  .guest-tag{
    display:inline-block; font-size:12px; letter-spacing:0.1em; color:#f6ead2;
    background: var(--ink-soft); padding: 3px 10px; border-radius: 2px; margin-bottom:10px;
  }
  .guest-name{
    font-family:'Shippori Mincho', serif; font-size: 24px; font-weight:800; margin: 0 0 12px;
    color: var(--ink);
  }
  .request-box{
    border-left: 3px solid var(--seal);
    padding: 10px 16px; background: rgba(255,255,255,0.3);
    font-size: 15px; line-height: 1.85; margin-bottom: 20px; color: var(--ink);
  }

  .items-grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px){ .items-grid{ grid-template-columns: 1fr; } }
  .item-card{
    border:1px solid var(--line); background: rgba(255,255,255,0.35);
    border-radius: 3px; padding: 14px 14px 16px; text-align:left; cursor:pointer;
    font-family:'Noto Serif JP', serif; color: var(--ink); position:relative;
    transition: all 0.15s ease;
  }
  .item-card:hover{ border-color: var(--seal); background: rgba(255,255,255,0.55); transform: translateY(-2px); }
  .item-letter{
    font-family:'Shippori Mincho', serif; color: var(--seal); font-weight:800; font-size:13px;
    margin-bottom: 4px; letter-spacing:0.1em;
  }
  .item-name{ font-weight:700; font-size:15.5px; margin-bottom:6px; }
  .item-desc{ font-size:12.5px; color: var(--ink-soft); line-height:1.6; }

  /* Result */
  .result-text{ font-size:15px; line-height:1.9; margin-bottom:16px; color:var(--ink); }
  .fact-box{
    background: rgba(43,33,24,0.06);
    border: 1px dashed var(--gold);
    border-radius: 3px; padding: 12px 14px; margin-bottom: 20px;
  }
  .fact-label{
    font-size:11px; letter-spacing:0.15em; color: var(--gold); font-weight:700; margin-bottom:5px;
  }
  .fact-text{ font-size:12.5px; line-height:1.75; color: var(--ink-soft); }

  .outcome-badge{
    display:inline-block; font-size:12px; padding:3px 10px; border-radius:2px; margin-bottom:12px;
    font-weight:700; letter-spacing:0.08em;
  }
  .outcome-good{ background:#3f5a3a; color:#eef4e6; }
  .outcome-mid{ background:#8a7052; color:#f6ead2; }
  .outcome-bad{ background:#5a2a24; color:#f4dcd6; }

  .footer-note{ text-align:center; font-size:11px; color:#8a7050; margin-top: 14px; letter-spacing:0.08em;}

  .ending-title{
    font-family:'Shippori Mincho', serif; font-size: 24px; font-weight:800; text-align:center;
    margin: 4px 0 16px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ===================== DATA ===================== */

const CHARACTERS = [
  {id:'kansin', name:'韓信', era:'秦末〜楚漢', fetch:'あの日の股くぐり、忘れたことはない、と韓信は静かに現れる。'},
  {id:'shoka', name:'蕭何', era:'秦末〜楚漢', fetch:'貸し借りはきちんと返す性分でな、と蕭何は帳簿を閉じながら現れる。'},
  {id:'koketsu', name:'勾践', era:'春秋戦国', fetch:'苦難を共にした者よ、と勾践は静かに告げる。あの日の品の苦さを、今も懐に忍ばせているという。'},
  {id:'sonpin', name:'孫臏', era:'春秋戦国', fetch:'策を授かった恩、忘れてはおらぬ、と孫臏は杖をつきながら現れる。'},
  {id:'kutsugen', name:'屈原', era:'春秋戦国', fetch:'あの日、川辺で拾った言葉を今も胸に、と屈原は静かに佇む。'},
  {id:'keika', name:'荊軻', era:'秦末', fetch:'あの日の餞、忘れはせぬ、と荊軻は盃を片手に笑う。'},
  {id:'shoou', name:'商鞅', era:'春秋戦国', fetch:'法も情も、貸し借りは正確にせねばな、と商鞅は帳面片手に現れる。'},
  {id:'mousyoukun', name:'孟嘗君', era:'春秋戦国', fetch:'食客の一人に加えてやろう、と孟嘗君は豪快に笑う。'},
  {id:'sosin', name:'蘇秦', era:'春秋戦国', fetch:'あの日の錐の痛み、今も覚えている、と蘇秦は懐かしそうに語る。'},
  {id:'souji', name:'荘子', era:'春秋戦国', fetch:'夢か現か、そなたに会いに来たのかもしれぬな、と荘子は笑う。'},
  {id:'kouu', name:'項羽', era:'秦末〜楚漢', fetch:'あの夜のこと、忘れてはおらぬ、と項羽は大きな声で笑う。'},
  {id:'ryuuhou', name:'劉邦', era:'秦末〜楚漢', fetch:'世話になったな、と劉邦は気安く肩を叩いてくる。'},
  {id:'chouryou', name:'張良', era:'秦末〜楚漢', fetch:'静かに礼を述べに参った、と張良は深く一礼する。'},
  {id:'hanzou', name:'范増', era:'秦末〜楚漢', fetch:'あの夜の助言、無駄にはならなんだ、と范増は杖をついて現れる。'},
  {id:'hankai', name:'樊噲', era:'秦末〜楚漢', fetch:'恩は忘れぬ、と樊噲は肉の匂いをさせながらやってくる。'},
  {id:'chinpei', name:'陳平', era:'秦末〜楚漢', fetch:'貸しは返す主義でな、と陳平はにやりと笑う。'},
  {id:'gyokuki', name:'虞姫', era:'秦末〜楚漢', fetch:'あの夜の舞、忘れませぬ、と虞姫は静かに微笑む。'},
];

// item: {name, desc, result, rep(delta), sat(delta), tier: 'good'|'mid'|'bad'}
const EPISODES = [
{cid:'kansin', request:'「淮陰の市場でならず者に絡まれた。『刺せるものなら刺してみろ、できねば股をくぐれ』とな。……店主、この場を凌ぎ、なお先々の大事を損なわぬ品はあるか」',
 items:[
  {name:'忍従の帯', desc:'締めると屈辱を静かな怒りとして腹に沈められる', rep:0, sat:1, tier:'mid',
   result:'韓信、無言で股をくぐりきる。ならず者は拍子抜けした顔で「……なんだ、あっさりだな」とつまらなそうに立ち去る。'},
  {name:'哄笑の仮面', desc:'被ると、どんな屈辱の場でも大声で笑い出してしまう', rep:1, sat:2, tier:'good',
   result:'仮面のせいで大笑いしながら股をくぐる韓信に、ならず者のほうが引いて逃げていく。市場中がその笑い声にざわつく見世物になった。'},
  {name:'雄弁の巻物', desc:'弁舌が三割増しになる', rep:-1, sat:0, tier:'bad',
   result:'朗々と語る韓信にならず者は「賢そうに喋ってんじゃねえ」と余計に苛立ち、小突き回された上で股をくぐる羽目に。'},
  {name:'焔霜の名刀', desc:'一太刀で決着をつけられる業物', rep:-1, sat:0, tier:'bad',
   result:'柄に手をかけた瞬間、手が震えて抜けず、「腰抜けが刀だけ立派だな」と二重に笑われる。'},
 ], fact:'韓信は実際に股をくぐり、後に大将軍として頭角を現したと伝わる（「胯下の辱」の故事）。'},

{cid:'kansin', request:'「趙の大軍を前に、あえて川を背にして布陣する。退路なき陣で兵に死力を尽くさせたい。……店主、良い品はあるか」',
 items:[
  {name:'断ち切りの太鼓', desc:'退却の合図を出せなくする', rep:1, sat:2, tier:'good',
   result:'太鼓が退却の合図を出せなくなり、兵たちは「もう戻れない」と悟った途端、目の色を変えて奮戦し始める。'},
  {name:'逆流知らずの筏', desc:'川を渡っても流されない', rep:-1, sat:0, tier:'bad',
   result:'筏が流されないため実質退路が残ってしまい、兵の一部が「まあ最悪泳げる」と気を抜いてしまう。'},
  {name:'発破の狼煙玉', desc:'大きな音で敵を脅かせる', rep:-1, sat:0, tier:'bad',
   result:'狼煙玉の轟音に自軍まで浮足立ち、統率が一瞬乱れる。'},
  {name:'空腹しのぎの干飯', desc:'兵糧が尽きても動ける', rep:0, sat:1, tier:'mid',
   result:'兵糧の心配がなくなった分、逆に「別に急いで勝たなくても」と緊張感がやや緩んでしまう。'},
 ], fact:'韓信は趙軍を前に川を背にして布陣し、退路のない兵に死力を尽くさせて大勝したと伝わる（「背水の陣」）。'},

{cid:'shoka', request:'「韓信が夜陰に紛れて陣を去った。今夜のうちに追いつかねば、漢は天下取りの要を永遠に失う。……店主、時は無い。何か貸してくれ」',
 items:[
  {name:'千里の沓', desc:'履けば夜通し疾走しても息切れしない', rep:0, sat:1, tier:'mid',
   result:'風のように駆け抜け追いつくが、韓信に「その脚、人間ですか」と若干引かれる。'},
  {name:'星読みの羅針', desc:'行き先を星で推測できるが時間がかかる', rep:-1, sat:0, tier:'bad',
   result:'方角を三度間違え、消えかけた背中を叫びながら追いかける羽目に。'},
  {name:'説き伏せの舌根', desc:'追いついた際、相手を必ず翻意させる言葉が出る', rep:-1, sat:0, tier:'bad',
   result:'舌根が延々喋り続け、韓信は根負けして「わかりました戻ります」と折れるだけの絵面に。'},
  {name:'陳年の酒瓶', desc:'酌み交わせば確執が水に流れる（らしい）', rep:1, sat:2, tier:'good',
   result:'河原で回し飲みが始まり、気づけば二人して星を見ながら朝まで意気投合していた。'},
 ], fact:'蕭何は夜通し韓信を追いかけて連れ戻し、劉邦に大将軍として推挙したと伝わる（「蕭何月下追韓信」の故事）。'},

{cid:'shoka', request:'「韓信に謀反の疑いがかかっている。呂后さまの命で、韓信を宮中へおびき出さねばならぬ。……店主、良い品はあるか」',
 items:[
  {name:'祝勝の招待状', desc:'もっともらしい祝いの席への招待に見せかけられる', rep:1, sat:2, tier:'good',
   result:'「祝いの席だ」と気安く誘うと、韓信はかつての信頼からあっさり応じ、疑うそぶりも見せず宮中へ足を運んでしまう。'},
  {name:'本物の勝利の報', desc:'実際の戦勝の知らせをでっち上げられる', rep:0, sat:1, tier:'mid',
   result:'偽の戦勝の報に韓信はやや訝しみながらも一応顔を出すが、終始どこか警戒した様子を崩さない。'},
  {name:'疑い深さ払いの茶', desc:'飲ませると相手の警戒心が薄れる', rep:-1, sat:0, tier:'bad',
   result:'茶を飲ませても韓信の勘の良さは衰えず、「何か企んでいるな」とかえって警戒を強められる。'},
  {name:'逃げ足封じの鎖', desc:'密かに足枷をつけられる', rep:-1, sat:0, tier:'bad',
   result:'足枷を仕込もうとした気配に韓信が気づき、一触即発の空気になってしまう。'},
 ], fact:'韓信を大将軍に推挙したのも蕭何なら、後に呂后と謀って宮中へおびき寄せ誅殺させたのも蕭何だったと伝わる（「成也蕭何、敗也蕭何」）。'},

{cid:'koketsu', request:'「呉に敗れ、会稽で生き恥を晒した。この屈辱、片時も忘れてはならぬ。……店主、忘れぬための品をくれ」',
 items:[
  {name:'苦胆の壺', desc:'舐めるたび強烈な苦味が走り、忘れかけた記憶を呼び覚ます', rep:1, sat:2, tier:'good',
   result:'舐めるたびあまりの苦さに勾践が顔を歪め、周囲の家臣まで一緒に顔をしかめる羽目に。「これは効く」と涙目で頷く姿が妙に様になっていた。'},
  {name:'硬藁の寝床', desc:'寝転ぶたび背中に薪が刺さり、熟睡できない', rep:0, sat:1, tier:'mid',
   result:'毎晩背中に薪が刺さり呻きながら目を覚ます勾践。家臣が「陛下、いっそ布団を足しては」と提案するが頑として断る。'},
  {name:'呉王の肖像扇', desc:'扇ぐたびに呉王夫差の顔が浮かび上がる', rep:-1, sat:0, tier:'bad',
   result:'扇ぐたびに現れる夫差の顔があまりに間抜けな表情で描かれており、怒りより先に噴き出しそうになって困る勾践。'},
  {name:'忘却の香炉', desc:'焚くと嫌な記憶がすっと薄れて楽になる', rep:-1, sat:0, tier:'bad',
   result:'焚いた瞬間、恨みも屈辱もふわっと消えて上機嫌になってしまい、家臣一同が慌てて香炉を取り上げる。'},
 ], fact:'勾践は薪の上に寝て苦い肝を舐め続け、屈辱を忘れぬようにし、後に呉を滅ぼしたと伝わる（「臥薪嘗胆」の由来）。'},

{cid:'koketsu', request:'「呉王夫差の心を緩ませ、国政を疎かにさせたい。美女・西施を送り込む算段だが……店主、後押しする品はあるか」',
 items:[
  {name:'魅了の紅', desc:'つけると誰の目にも一層美しく映る', rep:1, sat:2, tier:'good',
   result:'紅をつけた西施が夫差の前に現れると、夫差はすっかり心を奪われ、以後政務そっちのけで西施のもとへ通い詰めるようになる。'},
  {name:'もの忘れの香', desc:'焚くと相手が政務を忘れやすくなる', rep:-1, sat:0, tier:'bad',
   result:'香のせいで夫差の忘れっぽさが政務全般に及びすぎ、重臣たちが「近頃どうも様子がおかしい」と早々に勘づき始める。'},
  {name:'真心の耳飾り', desc:'つけると相手の本心が自然と伝わる', rep:-1, sat:0, tier:'bad',
   result:'耳飾りのせいで西施自身の複雑な心中まで夫差に伝わってしまい、かえって夫差が思い悩む展開に。'},
  {name:'見破り封じの帳', desc:'かけると計略が見抜かれにくくなる', rep:0, sat:1, tier:'mid',
   result:'計略は見抜かれにくくなるが、そのぶん西施の存在感も薄れてしまい、夫差の心をなかなか大きく動かせない。'},
 ], fact:'勾践は美女・西施を呉王夫差に献上して国政を緩ませ、後の呉討伐への布石としたと伝わる。'},

{cid:'sonpin', request:'「魏の大軍が我らを追う。竈の数を欺いて、油断を誘わねばならぬ。……店主、敵の目をたばかる品はあるか」',
 items:[
  {name:'縮小の竈型', desc:'本物そっくりだが本来より小さく、竈の数が少なく見える', rep:1, sat:2, tier:'good',
   result:'日ごとに竈の数がさりげなく減っていき、追手の斥候が「随分逃げ出したものだ」と算段違いの報告を上げ、油断しきって突っ込んでくる。'},
  {name:'誇張の狼煙', desc:'焚くと実際より何倍も大きな煙が上がる', rep:-1, sat:0, tier:'bad',
   result:'狼煙が派手すぎて逆に「何か企んでいるぞ」と怪しまれ、追手が慎重になってしまう。'},
  {name:'幻影の旗指物', desc:'立てるだけで兵の数が二倍に見える', rep:-1, sat:0, tier:'bad',
   result:'幻影の旗があまりに軽くてすぐ倒れ、風が吹くたびバレそうになってヒヤヒヤする羽目に。'},
  {name:'静音の太鼓', desc:'叩いても音がほとんど響かない', rep:0, sat:1, tier:'mid',

let state = null;

function newGame(){
  const pool = [...CHARACTERS];
  shuffle(pool);
  const chosenChars = pool.slice(0,5);
  const rounds = chosenChars.map(c=>{
    const eps = EPISODES.filter(e=>e.cid===c.id);
    const ep = eps[Math.floor(Math.random()*eps.length)];
    return {char:c, ep};
  });
  state = {
    rep: 2,
    round: 0,
    rounds: rounds,
    satisfaction: {}, // cid -> value
    ended: false,
  };
  chosenChars.forEach(c=>state.satisfaction[c.id]=0);
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

/* ===================== RENDER ===================== */
const app = document.getElementById('app');

function sealsHTML(rep){
  let html = '<div class="seals">';
  for(let i=1;i<=5;i++){
    html += `<div class="seal-dot ${i<=rep?'filled':''}">印</div>`;
  }
  html += '</div>';
  return html;
}

function shopHeaderHTML(rep){
  return `<div class="shop-header">
    <div class="shop-name">奇縁堂<small>KIEN-DŌ — 仙界の骨董店</small></div>
    ${sealsHTML(rep)}
  </div>`;
}

function renderTitle(){
  app.innerHTML = `
  <div class="scroll"><div class="scroll-inner">
    <div class="title-block">
      <div class="title-mark">印</div>
      <h1>奇縁堂</h1>
      <div class="sub">— 春秋戦国・楚漢の世を渡り歩く、不思議な店の物語 —</div>
      <div class="lore">
        <p>ここは、仙界からこの世に降ろされた見習い店主が営む、ちいさな骨董店「奇縁堂」。</p>
        <p>店には時おり、歴史に名を残す偉人たちが、それぞれの悩みや窮地を抱えてふらりと訪れる。あなたは棚の中から品を一つ選び、その手に渡す。</p>
        <p>品がもたらす顛末しだいで、店の評判は上下する。評判が尽きれば、修行は失敗に終わり仙界へ連れ戻されてしまう。5人の客を迎えたのち、もっとも心を動かされた客があなたを迎えに来るだろう。</p>
      </div>
    </div>
    <button class="primary" onclick="startGame()">店を開ける</button>
  </div></div>`;
}

function renderRound(){
  const r = state.rounds[state.round];
  app.innerHTML = `
  <div class="scroll"><div class="scroll-inner">
    ${shopHeaderHTML(state.rep)}
    <div class="stage-label">来客 ${state.round+1} / 5</div>
    <div class="guest-tag">${r.char.era}</div>
    <div class="guest-name">${r.char.name}</div>
    <div class="request-box">${r.ep.request}</div>
    <div class="items-grid">
      ${r.ep.items.map((it,idx)=>`
        <div class="item-card" onclick="chooseItem(${idx})">
          <div class="item-letter">${String.fromCharCode(65+idx)}</div>
          <div class="item-name">${it.name}</div>
          <div class="item-desc">${it.desc}</div>
        </div>
      `).join('')}
    </div>
  </div></div>`;
}

function renderResult(idx){
  const r = state.rounds[state.round];
  const it = r.ep.items[idx];
  const badgeClass = it.tier==='good'?'outcome-good':(it.tier==='mid'?'outcome-mid':'outcome-bad');
  const badgeText = it.tier==='good'?'客は満足げだった':(it.tier==='mid'?'まずまずの反応':'客はいまひとつだった');
  app.innerHTML = `
  <div class="scroll"><div class="scroll-inner">
    ${shopHeaderHTML(state.rep)}
    <div class="stage-label">来客 ${state.round+1} / 5 — ${r.char.name}</div>
    <span class="outcome-badge ${badgeClass}">${badgeText}</span>
    <div class="result-text">${it.result}</div>
    <div class="fact-box">
      <div class="fact-label">史実のかけら</div>
      <div class="fact-text">${r.ep.fact}</div>
    </div>
    <button class="primary" onclick="proceedAfterResult()">次へ</button>
  </div></div>`;
}

function renderGameOver(){
  const lastChar = state.rounds[state.round].char.name;
  app.innerHTML = `
  <div class="scroll"><div class="scroll-inner">
    ${shopHeaderHTML(0)}
    <div class="ending-title">修行、失敗</div>
    <div class="result-text">
      評判は地に落ちた。最後に訪れた${lastChar}は肩をすくめてこう言った。「残念だが、ここまでのようだな」。<br><br>
      店の暖簾は静かに下ろされ、あなたは仙界へと連れ戻されていく……店主としての修行は、ここで幕を閉じた。
    </div>
    <button class="primary" onclick="renderTitle()">もう一度挑む</button>
  </div></div>`;
}

function renderEnding(){
  // find highest satisfaction
  let bestChar = state.rounds[0].char;
  let bestVal = -1;
  state.rounds.forEach(rd=>{
    const v = state.satisfaction[rd.char.id];
    if(v>bestVal){ bestVal=v; bestChar=rd.char; }
  });
  let tierText;
  if(state.rep<=2){
    tierText = `店の評判はぎりぎりのところで踏みとどまった。仙界へ戻る道すがら、${bestChar.name}は「危なっかしい店だったが、憎めなかったな」と笑う。あなたは前途多難ながらも、また修行の続きへと向かうことになる。`;
  } else if(state.rep===3){
    tierText = `店の評判はまずまずだった。${bestChar.name}は「悪くない店だった」と満足げに頷き、あなたは次なる修行の地へと静かに旅立っていく。`;
  } else {
    tierText = `店の評判は大いに高まった。${bestChar.name}は「これほどの店主、他では見られぬ」と誇らしげに笑い、あなたは仙界でも一目置かれる存在として迎え入れられる。`;
  }
  app.innerHTML = `
  <div class="scroll"><div class="scroll-inner">
    ${shopHeaderHTML(state.rep)}
    <div class="ending-title">五人目を送り出して</div>
    <div class="result-text">${bestChar.fetch}</div>
    <div class="fact-box">
      <div class="fact-label">奇縁堂の結末</div>
      <div class="fact-text">${tierText}</div>
    </div>
    <button class="primary" onclick="renderTitle()">もう一度、店を開ける</button>
  </div></div>`;
}

/* ===================== ACTIONS ===================== */
function startGame(){
  newGame();
  renderRound();
}

let pendingIdx = null;
function chooseItem(idx){
  pendingIdx = idx;
  const r = state.rounds[state.round];
  const it = r.ep.items[idx];
  state.rep = Math.max(0, Math.min(5, state.rep + it.rep));
  state.satisfaction[r.char.id] = it.sat;
  renderResult(idx);
}

function proceedAfterResult(){
  if(state.rep<=0){
    renderGameOver();
    return;
  }
  state.round++;
  if(state.round>=state.rounds.length){
    renderEnding();
  } else {
    renderRound();
  }
}

/* init */
renderTitle();
</script>
</body>
</html>
